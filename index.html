* { margin: 0; padding: 0; box-sizing: border-box; }

.header { background: linear-gradient(135deg, #1a5276, #154360); color: #fff; text-align: center; padding: 12px; font-size: 20px; letter-spacing: 4px; border-bottom: 2px solid #1f6f9f; z-index: 1000; position: relative; }
.header .toggle-btn { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); border: none; color: #fff; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 16px; line-height: 1; transition: all .2s; }

.main { display: flex; flex: 1; overflow: hidden; }
.sidebar { width: 320px; background: #f5f7fa; display: flex; flex-direction: column; border-right: 1px solid #d0d7de; z-index: 999; transition: width .3s, padding .3s, border .3s; overflow: hidden; }
.sidebar.collapsed { width: 0; border-right: none; }
.form-section { padding: 14px 18px; border-bottom: 1px solid #d0d7de; background: #fff; }
.form-section label { color: #555; font-size: 12px; display: block; margin-bottom: 3px; font-weight: 500; }
.form-section input { width: 100%; padding: 8px 10px; border: 1px solid #c0c7cf; border-radius: 6px; background: #fff; color: #333; font-size: 14px; outline: none; margin-bottom: 8px; transition: border .2s; }
.form-section input:focus { border-color: #2980b9; box-shadow: 0 0 0 3px rgba(41,128,185,.1); }
.form-section input::placeholder { color: #aaa; }
.btn-row { display: flex; gap: 6px; }
.btn { flex: 1; padding: 8px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; transition: all .2s; font-weight: 500; }
.btn-primary { background: #2980b9; color: #fff; }
.btn-primary:hover { background: #1f6f9f; }
.btn-outline { background: #fff; color: #555; border: 1px solid #c0c7cf; font-size: 12px; }
.btn-outline:hover { border-color: #2980b9; color: #2980b9; }
.btn-outline.active { background: #2980b9; color: #fff; border-color: #2980b9; }
.admin-only { display: none; }
.list-section { flex: 1; overflow-y: auto; padding: 12px 14px; }
.list-section h3 { color: #666; font-size: 12px; margin-bottom: 8px; font-weight: 500; display: flex; justify-content: space-between; align-items: center; }
/* 测距提示条 */
.measure-hint { background: #fff3cd; border: 1px solid #ffc107; border-radius: 6px; padding: 8px 12px; margin-bottom: 10px; font-size: 12px; color: #856404; }
.measure-hint .result { font-size: 16px; font-weight: 700; color: #e67e22; margin-top: 2px; }
.measure-hint .clear { font-size: 11px; color: #2980b9; cursor: pointer; float: right; margin-top: 2px; }
.measure-hint .clear:hover { text-decoration: underline; }
.entry-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; margin-bottom: 5px; border-radius: 6px; background: #fff; border: 2px solid #e0e4e9; transition: all .2s; cursor: pointer; }
.entry-item:hover { border-color: #2980b9; box-shadow: 0 2px 6px rgba(0,0,0,0.06); }
.entry-item.selected { border-color: #e67e22; background: #fff8f0; }
.entry-item.start { border-color: #e67e22; box-shadow: 0 0 0 2px rgba(230,126,34,0.25); }
.entry-item.end { border-color: #9b59b6; box-shadow: 0 0 0 2px rgba(155,89,182,0.25); }
.entry-dot { flex-shrink: 0; width: 10px; height: 10px; border-radius: 50%; }
.entry-info { flex: 1; min-width: 0; }
.entry-name { color: #333; font-size: 13px; font-weight: 500; }
.entry-city { color: #888; font-size: 11px; }
.entry-tag { display: inline-block; font-size: 10px; padding: 1px 5px; border-radius: 3px; margin-left: 4px; font-weight: 500; }
.entry-tag.from { background: #fdebd0; color: #e67e22; }
.entry-tag.to { background: #f4ecf7; color: #9b59b6; }
.entry-del { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: 4px; transition: all .2s; flex-shrink: 0; }
.entry-del:hover { background: rgba(231,76,60,.1); }
.empty-hint { color: #bbb; text-align: center; padding: 40px 0; font-size: 13px; }
#map { flex: 1; z-index: 1; }
.leaflet-div-icon { background: none; border: none; }
.user-marker { display: flex; align-items: center; justify-content: center; }
.user-marker .dot { flex-shrink: 0; width: 18px; height: 18px; border: 3px solid #fff; border-radius: 50%; box-shadow: 0 0 6px rgba(0,0,0,0.5), 0 2px 8px rgba(0,0,0,0.35); position: relative; animation: pulse 1.2s ease-in-out infinite; }
.user-marker .dot::after { content: ''; position: absolute; top: -6px; left: -6px; width: 24px; height: 24px; border-radius: 50%; animation: pulseRing 1.2s ease-in-out infinite; pointer-events: none; }
@keyframes pulse { 0%, 100% { box-shadow: 0 0 8px currentColor, 0 0 0 0 currentColor; } 50% { box-shadow: 0 0 8px currentColor, 0 0 0 22px transparent; } }
@keyframes pulseRing { 0%, 100% { width: 24px; height: 24px; top: -6px; left: -6px; opacity: 0; border-width: 3px; } 50% { width: 52px; height: 52px; top: -20px; left: -20px; opacity: 0.7; border-width: 2px; } }
.user-label { background: rgba(0,0,0,0.75); color: #fff; padding: 2px 8px; border-radius: 10px; font-size: 12px; white-space: nowrap; margin-left: 2px; flex-shrink: 0; }
.dist-label { background: rgba(0,0,0,0.8); color: #ffd700; padding: 2px 10px; border-radius: 10px; font-size: 12px; white-space: nowrap; font-weight: 600; }
.layer-switch { position: absolute; top: 10px; right: 10px; z-index: 999; display: flex; gap: 4px; }
.layer-switch button { padding: 6px 12px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; font-size: 12px; transition: all .2s; }

function findCityCoord(input) {
  const s = input.trim();
  if (CITY_COORDS[s]) return CITY_COORDS[s];
  const ns = s.replace(/市$/,'');
  if (CITY_COORDS[ns]) return CITY_COORDS[ns];
  if (CITY_COORDS[s+'市']) return CITY_COORDS[s+'市'];
  for (const [k,v] of Object.entries(CITY_COORDS)) {
    if (k.includes(ns) || ns.includes(k.replace(/市$/,''))) return v;
  }
  return null;
}

function haversineKm(lat1,lng1,lat2,lng2) {
  const R=6371, dLat=(lat2-lat1)*Math.PI/180, dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function formatDist(km) { return km>=1000?(km/1000).toFixed(1)+'千公里':Math.round(km)+'公里'; }

// ===== 测距选择 =====
let selA = null; // { index, lat, lng, name, city }
let selB = null;

function clearSelection() {
  selA = null; selB = null;
  document.getElementById('measureHint').style.display = 'none';
  renderList();
  renderMeasureLine();
}

function toggleSelection(idx) {
  const e = entries[idx];
  const pt = { index: idx, lat: e.lat, lng: e.lng, name: e.name, city: e.city };

  if (selA && selA.index === idx) { clearSelection(); return; }
  if (selB && selB.index === idx) { clearSelection(); return; }

  if (!selA) {
    selA = pt; selB = null;
  } else if (!selB) {
    selB = pt;
  } else {
    // 两个都选了，重新开始
    selA = pt; selB = null;
  }

  updateMeasureHint();
  renderList();
  renderMeasureLine();
}

function updateMeasureHint() {
  const hint = document.getElementById('measureHint');
  if (!selA) { hint.style.display = 'none'; return; }
  hint.style.display = 'block';

  if (selA && selB) {
    const km = haversineKm(selA.lat, selA.lng, selB.lat, selB.lng);
    hint.innerHTML =
      '<span class="clear" onclick="clearSelection()">清除</span>'
      + selA.name + '（' + selA.city + '）↔ ' + selB.name + '（' + selB.city + '）'
      + '<div class="result">直线距离：' + formatDist(km) + '</div>';
  } else {
    hint.innerHTML =
      '<span class="clear" onclick="clearSelection()">取消</span>'
      '已选起点：<b>' + selA.name + '</b>（' + selA.city + '）'
      + '<br>请再点击另一个人作为终点';
  }
}

// 暴露到全局
window.clearSelection = clearSelection;

// ===== 地图 =====
const map = L.map('map', { center:[35.8,106.5], zoom:6, zoomControl:true, attributionControl:false });
const normalLayer = L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
  subdomains:'1234', maxZoom:18, minZoom:3,
}).addTo(map);
const satelliteLayer = L.tileLayer('https://webst0{s}.is.autonavi.com/appmaptile?style=6&x={x}&y={y}&z={z}', {
  subdomains:'1234', maxZoom:18, minZoom:3,
});

let currentLayer = 'normal';
document.querySelector('.layer-switch').addEventListener('click', function(e) {
  if (e.target.tagName!=='BUTTON') return;
  const layer = e.target.dataset.layer;
  if (layer===currentLayer) return;
  document.querySelectorAll('.layer-switch button').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  currentLayer = layer;
  layer==='satellite' ? (map.removeLayer(normalLayer), satelliteLayer.addTo(map))
                      : (map.removeLayer(satelliteLayer), normalLayer.addTo(map));
});

// 城市参考点
const cityGroup = L.layerGroup().addTo(map);
const seen = new Set();
Object.entries(CITY_COORDS).forEach(([name,coord]) => {
  const k = coord[0].toFixed(3)+','+coord[1].toFixed(3);
  if (!seen.has(k)) { seen.add(k);
    const m = L.circleMarker([coord[1],coord[0]],{radius:3,fillColor:'#2980b9',color:'transparent',fillOpacity:.35,weight:0}).addTo(cityGroup);
    m.bindTooltip(name.replace(/市$/,''),{direction:'right',offset:[4,0],opacity:.8});
  }
});

// 用户标记
const userGroup = L.layerGroup().addTo(map);
const measureLineGroup = L.layerGroup().addTo(map);

function createUserIcon(name, color) {
  return L.divIcon({
    className:'leaflet-div-icon',
    html:'<div class="user-marker"><div class="dot" style="background:'+color+';color:'+color+';"></div>'
      +'<span class="user-label">'+escHtml(name)+'</span></div>',
    iconSize:[0,0], iconAnchor:[8,8],
  });
}

function renderMeasureLine() {
  measureLineGroup.clearLayers();
  if (!selA || !selB) return;

  L.polyline([[selA.lat,selA.lng],[selB.lat,selB.lng]], {
    color:'#ffd700', weight:3, dashArray:'8 4', opacity:.85,
  }).addTo(measureLineGroup);

  const midLat = (selA.lat+selB.lat)/2, midLng = (selA.lng+selB.lng)/2;
  const km = haversineKm(selA.lat,selA.lng,selB.lat,selB.lng);
  L.marker([midLat,midLng], {
    icon: L.divIcon({
      className:'leaflet-div-icon',
      html:'<span class="dist-label">'+formatDist(km)+'</span>',
      iconSize:[0,0], iconAnchor:[35,10],
    }),
  }).addTo(measureLineGroup);

  // 自动调整视野包含两点
  const bounds = L.latLngBounds([[selA.lat,selA.lng],[selB.lat,selB.lng]]);
  map.fitBounds(bounds, { padding:[60,60], maxZoom:8 });
}

function renderAll() {
  userGroup.clearLayers();
  // 先统计每个城市有多少人
  const cityGroups = {};
  entries.forEach((e, i) => {
    const key = e.lng.toFixed(4) + ',' + e.lat.toFixed(4);
    if (!cityGroups[key]) cityGroups[key] = { lng: e.lng, lat: e.lat, items: [] };
    cityGroups[key].items.push(i);
  });

  // 同城多人按姓名排序，竖向排列
  const positions = [];
  Object.values(cityGroups).forEach(g => {
    const centerLat = g.lat, centerLng = g.lng;
    // 按姓名排序
    const sorted = g.items.slice().sort((a, b) => entries[a].name.localeCompare(entries[b].name, 'zh'));
    const spacing = 0.015; // 每个名字间隔约 1.7km
    const start = -(sorted.length - 1) * spacing / 2; // 居中
    sorted.forEach((entryIdx, i) => {
      positions[entryIdx] = [centerLat + start + i * spacing, centerLng];
    });
  });

  entries.forEach((e, i) => {
    const [lat, lng] = positions[i];
    const icon = createUserIcon(e.name, e.color);
    const marker = L.marker([lat, lng], { icon }).addTo(userGroup);
    marker.bindPopup('<b>' + escHtml(e.name) + '</b><br>' + escHtml(e.city));
    marker.on('click', function(ev) {
      L.DomEvent.stopPropagation(ev);
      toggleSelection(i);
    });
  });
  renderMeasureLine();
}

// 显示/隐藏名字
let showNames = true;
document.getElementById('toggleNamesBtn').addEventListener('click', function() {
  showNames = !showNames;
  this.classList.toggle('active', !showNames);
  document.querySelectorAll('.user-label').forEach(el=>el.style.display=showNames?'':'none');
});

// ===== 列表 =====
function renderList() {
  const listEl = document.getElementById('entryList');
  const countEl = document.getElementById('countSpan');
  countEl.textContent = entries.length;
  if (entries.length===0) {
    listEl.innerHTML = '<div class="empty-hint">暂无数据，请添加人员</div>'; return;
  }

  listEl.innerHTML = entries.map((e,i) => {
    let cls = '';
    let tag = '';
    if (selA && selA.index===i) { cls = ' start'; tag = ' <span class="entry-tag from">起点</span>'; }
    if (selB && selB.index===i) { cls = ' end'; tag = ' <span class="entry-tag to">终点</span>'; }
    return '<div class="entry-item'+cls+'" data-index="'+i+'">'
      +'<span class="entry-dot" style="background:'+e.color+';"></span>'
      +'<div class="entry-info">'
        +'<div class="entry-name">'+escHtml(e.name)+tag+'</div>'
        +'<div class="entry-city">'+escHtml(e.city)+'</div>'
      +'</div>'
      +'<button class="entry-del" data-index="'+i+'" title="删除">&times;</button>'
      +'</div>';
  }).join('');

  listEl.querySelectorAll('.entry-item').forEach(el => {
    el.addEventListener('click', function(ev) {
      if (ev.target.classList.contains('entry-del')) return;
      toggleSelection(parseInt(this.dataset.index));
    });
  });
  listEl.querySelectorAll('.entry-del').forEach(btn => {
    btn.addEventListener('click', function(ev) {
      ev.stopPropagation();
      const idx = parseInt(this.dataset.index);
      // 如果删除的是选中项，清除选择
      if ((selA && selA.index===idx) || (selB && selB.index===idx)) clearSelection();
      // 调整选择索引
      if (selA && selA.index > idx) selA.index--;
      if (selB && selB.index > idx) selB.index--;
      entries.splice(idx, 1);
      saveEntries(entries);
      renderAll(); renderList();
    });
  });
}

function escHtml(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

// ===== 添加 =====
document.getElementById('addBtn').addEventListener('click', function() {
  const ni = document.getElementById('nameInput'), ci = document.getElementById('cityInput');
  const name = ni.value.trim(), city = ci.value.trim();
  if (!name) { alert('请输入姓名'); ni.focus(); return; }
  if (!city) { alert('请输入工作城市'); ci.focus(); return; }
  const coord = findCityCoord(city);
  if (!coord) { alert('未找到城市"'+city+'"的坐标'); return; }
  entries.push({name,city,lng:coord[0],lat:coord[1],color:nextColor()});
  saveEntries(entries); renderAll(); renderList();
  map.setView([coord[1],coord[0]], 10, {animate:true});
  ni.value=''; ci.value=''; ni.focus();
});
document.getElementById('cityInput').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('addBtn').click();});
document.getElementById('nameInput').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();document.getElementById('cityInput').focus();}});

// ===== Excel 导入/导出 =====
const fileInput = document.getElementById('fileInput');
document.getElementById('importBtn').addEventListener('click', function() { fileInput.click(); });
document.getElementById('exportBtn').addEventListener('click', function() {
  const data = [['姓名', '工作城市']];
  entries.forEach(e => data.push([e.name, e.city]));
  const ws = XLSX.utils.aoa_to_sheet(data);
  ws['!cols'] = [{wch:15},{wch:15}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '人员列表');
  XLSX.writeFile(wb, 'zut9_人员列表.xlsx');
});

fileInput.addEventListener('change', function() {
  const file = fileInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1});
      // 跳过表头，从第二行开始
      let added = 0, skipped = 0;
      for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row || !row[0]) continue;
        const name = String(row[0]).trim();
        const city = row[1] ? String(row[1]).trim() : '';
        if (!name || !city) { skipped++; continue; }
        const coord = findCityCoord(city);
        if (!coord) { skipped++; continue; }
        entries.push({name, city, lng:coord[0], lat:coord[1], color:nextColor()});
        added++;
      }
      saveEntries(entries); renderAll(); renderList();
      alert('导入完成：成功 '+added+' 人'+(skipped>0?'，跳过 '+skipped+' 行（城市未匹配或数据不完整）':''));
    } catch(err) {
      alert('导入失败：'+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  fileInput.value = '';
});

// ===== 导出带数据的 HTML =====
document.getElementById('exportHtmlBtn').addEventListener('click', function() {
  const entriesJson = JSON.stringify(entries, null, 2);
  const html = document.documentElement.outerHTML;
  // 让导出的 HTML 优先从 localStorage 读取，没有则用预设数据
  const patched = html.replace(
    'let entries = loadEntries();',
    'let entries = loadEntries();\nif (entries.length === 0) { entries = ' + entriesJson + '; saveEntries(entries); }'
  );

  const blob = new Blob(['<!DOCTYPE html>\n' + patched], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'zut9_人员地图.html';
  a.click();
  URL.revokeObjectURL(url);
});

// ===== 点击地图空白处清除选择 =====
map.on('click', function() { if (selA) { clearSelection(); } });

renderAll(); renderList();
</script>
